<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>极乐迪斯科 · 你脑海中最吵的声音是哪个？</title>
<style>
  /* System font stack — avoids Google Fonts loading issues in China */
  /* @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Playfair+Display:wght@400;700;900&display=swap'); */

  :root {
    --intellect: #4a90c4; --intellect-glow: rgba(74,144,196,0.25);
    --psyche: #8b5fc0;    --psyche-glow: rgba(139,95,192,0.25);
    --physique: #c94a3a;  --physique-glow: rgba(201,74,58,0.25);
    --motorics: #c9a84c;  --motorics-glow: rgba(201,168,76,0.25);
    --bg: #1a1410; --card-bg: rgba(28,22,17,0.94);
    --text: #d4c8b8; --text-dim: #8a7e6e; --border: #3a3028;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Serif SC', 'Source Han Serif SC', 'STSong', 'SimSun', 'Songti SC', serif;
    min-height: 100vh; overflow-x: hidden;
  }

  /* Background */
  .bg-noise { position:fixed; top:0; left:0; width:100%; height:100%;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; z-index:0; }
  .bg-art { position:fixed; top:0; left:0; width:100%; height:100%;
    background:
      radial-gradient(ellipse at 30% 60%, rgba(180,120,40,0.10) 0%, transparent 60%),
      radial-gradient(ellipse at 75% 25%, rgba(100,140,180,0.08) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(10,6,2,0.75) 100%),
      linear-gradient(to bottom, rgba(30,28,26,0) 0%, rgba(40,35,30,0.3) 30%, rgba(30,22,18,0.6) 70%, rgba(18,12,8,0.85) 100%);
    pointer-events:none; z-index:0; }
  .paint-blob { position:fixed; pointer-events:none; z-index:0; opacity:0.04; filter:blur(60px); border-radius:45% 55% 50% 50%; }
  .paint-blob.b1 { width:600px; height:300px; background:var(--intellect); top:-100px; left:-200px; transform:rotate(-12deg); }
  .paint-blob.b2 { width:500px; height:260px; background:var(--psyche); bottom:-80px; right:-150px; transform:rotate(18deg); }
  .paint-blob.b3 { width:400px; height:220px; background:var(--physique); top:40%; left:-100px; transform:rotate(-25deg); }
  .paint-blob.b4 { width:380px; height:350px; background:var(--motorics); top:10%; right:-120px; transform:rotate(40deg); }

  .container { position:relative; z-index:1; max-width:800px; margin:0 auto; padding:30px 20px; }

  /* Screens */
  .screen { display:none; }
  .screen.active { display:block; animation: fadeUp 0.5s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  /* ── Start Screen ── */
  .start-content { text-align:center; padding:60px 20px; }
  .start-content .subtitle { font-size:13px; letter-spacing:6px; color:var(--text-dim); margin-bottom:12px; }
  .start-content h1 { font-size:clamp(32px,5vw,56px); font-weight:900;
    background: linear-gradient(180deg, #efe4d0 0%, #b8a58a 40%, #6a5c48 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    line-height:1.15; letter-spacing:3px; margin-bottom:16px; }
  .start-content .tagline { font-style:italic; color:var(--text-dim); font-size:15px; line-height:1.9; margin-bottom:40px; }
  .start-content .info-cards { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-bottom:44px; }
  .info-card { background:var(--card-bg); border:1px solid var(--border); padding:18px 24px; text-align:center; min-width:100px; }
  .info-card .num { font-size:32px; font-weight:900; color:#c9a84c; }
  .info-card .label { font-size:11px; color:var(--text-dim); letter-spacing:2px; margin-top:4px; }

  .btn {
    display:inline-block; padding:14px 48px; font-family:inherit; font-size:15px; letter-spacing:3px;
    border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.05);
    color:#d4c8b8; cursor:pointer; transition:all 0.35s; text-transform:uppercase;
  }
  .btn:hover { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.35); box-shadow:0 0 30px rgba(255,255,255,0.05); }
  .btn.primary { border-color:var(--motorics); box-shadow:0 0 24px var(--motorics-glow); }

  /* ── Quiz Screen ── */
  .quiz-header { margin-bottom:24px; }
  .progress-bar { width:100%; height:3px; background:var(--border); margin-bottom:10px; border-radius:2px; }
  .progress-fill { height:100%; background:linear-gradient(90deg, var(--intellect), var(--psyche), var(--physique), var(--motorics));
    border-radius:2px; transition:width 0.4s; }
  .progress-info { display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); letter-spacing:1px; }
  .skill-tag { display:inline-block; padding:3px 10px; font-size:11px; letter-spacing:2px; margin-bottom:20px; border:1px solid var(--border); color:var(--text-dim); }
  .question-text { font-size:20px; line-height:1.7; margin-bottom:28px; font-weight:600; letter-spacing:0.5px; }
  .options { display:flex; flex-direction:column; gap:10px; }
  .option {
    display:flex; align-items:center; gap:14px; padding:16px 20px;
    background:var(--card-bg); border:1px solid var(--border);
    cursor:pointer; transition:all 0.3s; text-align:left; font-family:inherit; color:var(--text); font-size:15px; line-height:1.5;
  }
  .option:hover { border-color:rgba(255,255,255,0.2); background:rgba(255,255,255,0.03); }
  .option.selected { border-color:rgba(255,255,255,0.35); background:rgba(255,255,255,0.06); }
  .option-letter { width:36px; height:36px; min-width:36px; border-radius:50%; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; flex-shrink:0; font-family:Arial,sans-serif; line-height:1; overflow:hidden; position:relative; z-index:1; background:var(--card-bg); margin-right:14px; transition:all 0.3s; }
  .option.selected .option-letter { border-color:#c9a84c; background:rgba(201,168,76,0.2); color:#c9a84c; }
  .option.intellect.selected { border-color:var(--intellect); }
  .option.intellect.selected .option-letter { border-color:var(--intellect); background:#1e3a4a; color:var(--intellect); }
  .option.psyche.selected { border-color:var(--psyche); }
  .option.psyche.selected .option-letter { border-color:var(--psyche); background:#2a1a3a; color:var(--psyche); }
  .option.physique.selected { border-color:var(--physique); }
  .option.physique.selected .option-letter { border-color:var(--physique); background:#3a1810; color:var(--physique); }
  .option.motorics.selected { border-color:var(--motorics); }
  .option.motorics.selected .option-letter { border-color:var(--motorics); background:#2a2410; color:var(--motorics); }

  .quiz-nav { display:flex; justify-content:space-between; margin-top:28px; }
  .btn-sm { padding:8px 20px; font-size:12px; letter-spacing:2px; }

  /* ── Results Screen ── */
  .results { text-align:center; }
  .result-header { margin-bottom:36px; }
  .result-header .subtitle { font-size:12px; letter-spacing:5px; color:var(--text-dim); margin-bottom:8px; }
  .result-header h2 { font-size:28px; font-weight:700; margin-bottom:6px; }
  .archetype-name { font-size:42px; font-weight:900; letter-spacing:4px;
    background: linear-gradient(180deg, #efe4d0 0%, #9a8a6a 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .archetype-en { font-size:13px; color:var(--text-dim); letter-spacing:3px; margin-top:4px; }
  .archetype-diagnosis { font-style:italic; color:#b0a090; font-size:15px; line-height:1.9; max-width:560px; margin:20px auto 0; }

  /* Attribute bars */
  .attr-bars { display:flex; flex-direction:column; gap:10px; max-width:500px; margin:0 auto 32px; }
  .attr-bar-row { display:flex; align-items:center; gap:12px; }
  .attr-bar-label { width:50px; font-size:13px; letter-spacing:1px; text-align:right; flex-shrink:0; }
  .attr-bar-track { flex:1; height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
  .attr-bar-fill { height:100%; border-radius:4px; transition:width 0.8s ease; }
  .attr-bar-fill.intellect { background:var(--intellect); box-shadow:0 0 8px var(--intellect-glow); }
  .attr-bar-fill.psyche { background:var(--psyche); box-shadow:0 0 8px var(--psyche-glow); }
  .attr-bar-fill.physique { background:var(--physique); box-shadow:0 0 8px var(--physique-glow); }
  .attr-bar-fill.motorics { background:var(--motorics); box-shadow:0 0 8px var(--motorics-glow); }
  .attr-bar-val { width:32px; font-size:12px; text-align:left; color:var(--text-dim); }

  /* Top skills */
  .top-skills { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-bottom:36px; }
  .top-skill-card { background:var(--card-bg); border:1px solid var(--border); padding:16px; width:140px; text-align:center; transition:all 0.35s; }
  .top-skill-card:hover { transform:translateY(-3px); }
  .top-skill-card.intellect:hover { border-color:var(--intellect); box-shadow:0 6px 20px var(--intellect-glow); }
  .top-skill-card.psyche:hover { border-color:var(--psyche); box-shadow:0 6px 20px var(--psyche-glow); }
  .top-skill-card.physique:hover { border-color:var(--physique); box-shadow:0 6px 20px var(--physique-glow); }
  .top-skill-card.motorics:hover { border-color:var(--motorics); box-shadow:0 6px 20px var(--motorics-glow); }
  .top-skill-card .portrait { width:80px; height:100px; margin:0 auto 10px; overflow:hidden; }
  .top-skill-card .portrait img { width:100%; height:100%; object-fit:cover; }
  .top-skill-card .skill-name { font-size:14px; font-weight:700; letter-spacing:1px; }
  .top-skill-card .skill-en { font-size:9px; color:var(--text-dim); letter-spacing:1px; margin-top:2px; }
  .top-skill-card .skill-voice { font-size:11px; color:#9a8a6a; font-style:italic; margin-top:8px; line-height:1.5; }

  .result-actions { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:32px; }

  /* Thought bubble */
  .thought-bubble { max-width:560px; margin:0 auto 32px; padding:20px 24px; background:rgba(255,255,255,0.03); border:1px solid var(--border); text-align:left; }
  .thought-bubble .tb-label { font-size:10px; letter-spacing:4px; color:var(--text-dim); margin-bottom:10px; text-transform:uppercase; }
  .thought-bubble .tb-text { font-size:14px; line-height:1.9; color:#b0a090; font-style:italic; }

  @media (max-width:600px) {
    .container { padding:16px 10px; }
    .question-text { font-size:17px; }
    .option { padding:12px 14px; font-size:13px; }
    .archetype-name { font-size:30px; }
    .top-skill-card { width:120px; }
  }
</style>
</head>
<body>

<div class="bg-noise"></div><div class="bg-art"></div>
<div class="paint-blob b1"></div><div class="paint-blob b2"></div><div class="paint-blob b3"></div><div class="paint-blob b4"></div>

<div class="container">

  <!-- ═══════════ START SCREEN ═══════════ -->
  <div class="screen active" id="screen-start">
    <div class="start-content">
      <div class="subtitle">Disco Elysium · Inner Voices Test</div>
      <h1>你脑海里<br>最吵的声音是哪个？</h1>
      <p class="tagline">
        24道情景题，探索你精神世界中那24个争吵的声音。<br>
        找出谁在你的脑海里拥有最大的话语权。
      </p>
      <div class="info-cards">
        <div class="info-card"><div class="num">24</div><div class="label">道情景题</div></div>
        <div class="info-card"><div class="num">4</div><div class="label">大属性</div></div>
        <div class="info-card"><div class="num">16</div><div class="label">种人格原型</div></div>
        <div class="info-card"><div class="num">~5</div><div class="label">分钟完成</div></div>
      </div>
      <button class="btn primary" onclick="startQuiz()">开 始 测 试</button>
    </div>
  </div>

  <!-- ═══════════ QUIZ SCREEN ═══════════ -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-header">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-info"><span id="progress-text">1 / 24</span><span id="attr-hint"></span></div>
    </div>
    <div class="skill-tag" id="skill-tag"></div>
    <div class="question-text" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <div class="quiz-nav">
      <button class="btn btn-sm" id="btn-prev" onclick="prevQuestion()" style="visibility:hidden">← 上一题</button>
      <button class="btn btn-sm primary" id="btn-next" onclick="nextQuestion()">下一题 →</button>
    </div>
  </div>

  <!-- ═══════════ RESULTS SCREEN ═══════════ -->
  <div class="screen" id="screen-results">
    <div class="results">
      <div class="result-header">
        <div class="subtitle">YOUR DOMINANT VOICE</div>
        <div class="archetype-name" id="result-archetype"></div>
        <div class="archetype-en" id="result-archetype-en"></div>
      </div>

      <div class="attr-bars" id="result-bars"></div>

      <div class="thought-bubble">
        <div class="tb-label">● 思维内阁诊断书</div>
        <div class="tb-text" id="result-diagnosis"></div>
      </div>

      <div class="top-skills" id="result-top-skills"></div>

      <p class="archetype-diagnosis" id="result-description"></p>

      <div class="result-actions">
        <button class="btn primary" onclick="restartQuiz()">再 测 一 次</button>
        <button class="btn" onclick="window.open('disco-elysium-compendium.html','_blank')">查看完整图鉴</button>
      </div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════
//  DATA: Skills, Questions, Archetypes
// ═══════════════════════════════════════

const ATTRS = ['intellect','psyche','physique','motorics'];
const ATTR_NAMES = { intellect:'智力', psyche:'精神', physique:'体格', motorics:'身手' };
const ATTR_COLORS = { intellect:'#4a90c4', psyche:'#8b5fc0', physique:'#c94a3a', motorics:'#c9a84c' };

// 24 skills with their attribute, Chinese name, English name, and a short voice quote
const SKILLS = [
  // Intellect
  { id:'logic', attr:'intellect', cn:'逻辑思维', en:'Logic', voice:'"冷静。严谨。我是你脑中唯一清醒的声音。"' },
  { id:'encyclopedia', attr:'intellect', cn:'博学多闻', en:'Encyclopedia', voice:'"让我告诉你关于香烟品牌的一切——与本案无关但很有趣。"' },
  { id:'rhetoric', attr:'intellect', cn:'能说会道', en:'Rhetoric', voice:'"他们在撒谎。让我撕碎他们的逻辑——用最华丽的修辞。"' },
  { id:'drama', attr:'intellect', cn:'故弄玄虚', en:'Drama', voice:'"陛下，世界是一座舞台。但别信我说的任何话！"' },
  { id:'conceptualization', attr:'intellect', cn:'标新立异', en:'Conceptualization', voice:'"如果你不跳进活火山，苟活于世还有什么意思？"' },
  { id:'visual_calculus', attr:'intellect', cn:'见微知著', en:'Visual Calculus', voice:'"子弹以17度角弹跳。凶手身高175-180。我重建了一切。"' },
  // Psyche
  { id:'volition', attr:'psyche', cn:'平心定气', en:'Volition', voice:'"别喝酒。别吸毒。别把枪管塞进嘴里。我是你最后的防线。"' },
  { id:'inland_empire', attr:'psyche', cn:'内陆帝国', en:'Inland Empire', voice:'"嘘……你听到了吗？墙壁在说话。你的领带也在说话。"' },
  { id:'empathy', attr:'psyche', cn:'通情达理', en:'Empathy', voice:'"她的悲伤有另一个人的名字。我替你感受这一切。"' },
  { id:'authority', attr:'psyche', cn:'争强好胜', en:'Authority', voice:'"他们必须尊重你。如果不——那就让他们恐惧你。"' },
  { id:'esprit_de_corps', attr:'psyche', cn:'同舟共济', en:'Esprit de Corps', voice:'"此刻，朱蒂特正在档案室翻看你的卷宗。她在担心你。"' },
  { id:'suggestion', attr:'psyche', cn:'循循善诱', en:'Suggestion', voice:'"低声一点。让他们以为那是他们自己的想法。来，我教你……"' },
  // Physique
  { id:'endurance', attr:'physique', cn:'钢筋铁骨', en:'Endurance', voice:'"再来一拳。你的身体比你的意志更坚强。引擎永不熄火。"' },
  { id:'pain_threshold', attr:'physique', cn:'坚忍不拔', en:'Pain Threshold', voice:'"疼吗？这不算什么。说实话——我有点享受这个。"' },
  { id:'physical_instrument', attr:'physique', cn:'强身健体', en:'Physical Instrument', voice:'"讲什么道理——你有一身的肌肉！直接撞过去。"' },
  { id:'electrochemistry', attr:'physique', cn:'食髓知味', en:'Electrochemistry', voice:'"再吸一口。看看那个人——你不想要吗？别对抗我，我总是赢。"' },
  { id:'shivers', attr:'physique', cn:'天人感应', en:'Shivers', voice:'"风从马丁内斯湾吹来。这座城市很冷。它在对你低语……"' },
  { id:'half_light', attr:'physique', cn:'疑神疑鬼', en:'Half Light', voice:'"那个人的眼神不对。跑！或者先下手为强。永远别放松。"' },
  // Motorics
  { id:'hand_eye_coordination', attr:'motorics', cn:'眼明手巧', en:'Hand/Eye Coordination', voice:'"瞄准。呼吸。扣扳机。你的手知道该怎么做。"' },
  { id:'perception', attr:'motorics', cn:'五感发达', en:'Perception', voice:'"糖罐里有叠起来的小钞。他咽了一下口水——他在紧张。"' },
  { id:'reaction_speed', attr:'motorics', cn:'反应速度', en:'Reaction Speed', voice:'"闪避！他的拳头快——但我的反射更快。身体先动，大脑跟上。"' },
  { id:'savoir_faire', attr:'motorics', cn:'鬼祟玲珑', en:'Savoir Faire', voice:'"滑步。转身。没人看到你。你是瑞瓦肖最酷的混蛋。"' },
  { id:'interfacing', attr:'motorics', cn:'能工巧匠', en:'Interfacing', voice:'"给我一把螺丝刀。比起人，我更喜欢和机器对话。"' },
  { id:'composure', attr:'motorics', cn:'从容自若', en:'Composure', voice:'"他以为会激怒你。他看到一个扑克脸。还有，那外套确实很丑。"' },
];

// 24 Questions — each targets one skill, 4 options scored 1-4
const QUESTIONS = [
  // ── INTELLECT ──
  { skill:'logic', text:'凌晨三点，你盯着天花板，一个问题在你脑中反复盘旋：这一切到底讲不讲得通？',
    options:[
      { text:'翻出纸笔。如果宇宙有逻辑，你一定能把它画成一张流程图。', score:4 },
      { text:'逻辑有它的局限。有些东西只能在直觉的暗室里显影。', score:2 },
      { text:'想不明白的事情不值得想——翻个身，睡觉。', score:1 },
      { text:'你不会是第一个问这个问题的人。找本书，看看前人怎么说。', score:3 },
    ]},
  { skill:'encyclopedia', text:'酒桌上有人提起了一个八竿子打不着的历史冷知识。你体内那个万事通立刻醒了。',
    options:[
      { text:'你接过话头，从古罗马的铅中毒一路讲到瑞瓦肖香烟品牌的起源。没人让你停，但也没人让你继续。', score:4 },
      { text:'你小心翼翼地挤出两个精准的细节——恰到好处，点到为止。被人嫌烦的痛你还记得。', score:3 },
      { text:'你静静听着，在心里默默纠正了对方三处事实错误。但你没有开口。今天不是好为人师的日子。', score:2 },
      { text:'"哦。"你喝了一口酒。信息就在你脑子里，但它今天不想出来。', score:1 },
    ]},
  { skill:'rhetoric', text:'一个陌生人在公共场合发表了一段让你血管沸腾的言论。不是观点不同——是逻辑本身被侮辱了。',
    options:[

// ═══════════════ STATE ═══════════════
let currentQuestion = 0;
let answers = new Array(24).fill(null); // stores score 1-4 for each question

// ═══════════════ START ═══════════════
function startQuiz() {
  currentQuestion = 0;
  answers = new Array(24).fill(null);
  showScreen('screen-quiz');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════ QUIZ ═══════════════
function renderQuestion() {
  const q = QUESTIONS[currentQuestion];
  const skill = SKILLS.find(s => s.id === q.skill);

  document.getElementById('progress-fill').style.width = (currentQuestion / 24 * 100) + '%';
  document.getElementById('progress-text').textContent = `${currentQuestion + 1} / 24`;
  document.getElementById('attr-hint').textContent = ATTR_NAMES[skill.attr];
  document.getElementById('skill-tag').textContent = skill.cn + ' · ' + skill.en;
  document.getElementById('question-text').textContent = q.text;

  const container = document.getElementById('options-container');
  const letters = ['A','B','C','D'];
  container.innerHTML = q.options.map((opt, i) => {
    const attrClass = ['intellect','psyche','physique','motorics'][i]; // 4 options map to 4 attrs
    const selected = answers[currentQuestion] === opt.score ? ' selected' : '';
    return `
      <div class="option ${attrClass}${selected}" onclick="selectAnswer(${opt.score}, this)" data-score="${opt.score}">
        <div class="option-letter">${letters[i]}</div>
        <span>${opt.text}</span>
      </div>`;
  }).join('');

  // Nav buttons — only show prev, auto-advance on selection
  document.getElementById('btn-prev').style.visibility = currentQuestion > 0 ? 'visible' : 'hidden';
  document.getElementById('btn-next').style.display = 'none';
}

let advancing = false;

function selectAnswer(score, el) {
  if (advancing) return; // timeout in progress
  answers[currentQuestion] = score;
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  advancing = true;
  setTimeout(() => {
    advancing = false;
    if (currentQuestion < 23) {
      currentQuestion++;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      showResults();
    }
  }, 200);
}

function nextQuestion() {
  if (answers[currentQuestion] === null) return;
  if (currentQuestion < 23) {
    currentQuestion++;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showResults();
  }
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ═══════════════ RESULTS ═══════════════
function showResults() {
  // 1. Calculate skill scores
  const skillScores = {};
  QUESTIONS.forEach((q, i) => {
    skillScores[q.skill] = answers[i];
  });

  // 2. Calculate sub-dimension scores
  const subDimScores = {};
  SUB_DIMS.forEach(sd => {
    subDimScores[sd.id] = skillScores[sd.skills[0]] + skillScores[sd.skills[1]];
  });

  // 3. Compress to L/M/H (1/2/3)
  const userVector = SUB_DIMS.map(sd => {
    const raw = subDimScores[sd.id]; // range 2-8
    if (raw <= 4) return 1;       // L
    if (raw <= 6) return 2;       // M
    return 3;                      // H
  });

  // 4. Calculate attribute scores (for display)
  const attrScores = { intellect:0, psyche:0, physique:0, motorics:0 };
  SKILLS.forEach(s => {
    attrScores[s.attr] += skillScores[s.id];
  });
  const maxAttrScore = Math.max(...Object.values(attrScores));

  // 5. Match archetype using Manhattan distance
  let bestArchetype = null;
  let bestDistance = Infinity;
  ARCHETYPES.forEach(arch => {
    let dist = 0;
    for (let i = 0; i < 12; i++) {
      dist += Math.abs(userVector[i] - arch.vector[i]);
    }
    if (dist < bestDistance) {
      bestDistance = dist;
      bestArchetype = arch;
    }
  });

  // 6. Get top 3 skills — one from each of the top 3 attributes
  const attrOrder = Object.entries(attrScores).sort((a,b) => b[1]-a[1]).map(e=>e[0]);
  const top3 = attrOrder.slice(0,3).map(attr => {
    const attrSkills = SKILLS.filter(s => s.attr === attr);
    attrSkills.sort((a,b) => skillScores[b.id] - skillScores[a.id]);
    return { ...attrSkills[0], score: skillScores[attrSkills[0].id] };
  });

  // ── Render ──
  document.getElementById('result-archetype').textContent = bestArchetype.name;
  document.getElementById('result-archetype-en').textContent = bestArchetype.en;
  document.getElementById('result-diagnosis').textContent = bestArchetype.diagnosis;

  // Attribute bars
  const barOrder = ['intellect','psyche','physique','motorics'];
  const barEmoji = { intellect:'🧠', psyche:'💜', physique:'💪', motorics:'👁️' };
  document.getElementById('result-bars').innerHTML = barOrder.map(attr => {
    const pct = Math.round(attrScores[attr] / 24 * 100);
    const color = ATTR_COLORS[attr];
    return `
      <div class="attr-bar-row">
        <div class="attr-bar-label">${barEmoji[attr]} ${ATTR_NAMES[attr]}</div>
        <div class="attr-bar-track"><div class="attr-bar-fill ${attr}" style="width:${pct}%"></div></div>
        <div class="attr-bar-val">${attrScores[attr]}</div>
      </div>`;
  }).join('');

  // Top 3 skills
  document.getElementById('result-top-skills').innerHTML = top3.map(s => `
    <div class="top-skill-card ${s.attr}">
      <div class="portrait"><img src="images/portraits/portrait_${s.id}.png" alt="" onerror="this.style.opacity='0.3'"></div>
      <div class="skill-name">${s.cn}</div>
      <div class="skill-en">${s.en}</div>
      <div class="skill-voice">${s.voice}</div>
    </div>
  `).join('');

  document.getElementById('result-description').textContent = bestArchetype.desc;

  showScreen('screen-results');
  // Delay bar animation
  setTimeout(() => {
    document.querySelectorAll('.attr-bar-fill').forEach(bar => {
      bar.style.width = bar.style.width; // trigger reflow
    });
  }, 100);
}

function restartQuiz() {
  currentQuestion = 0;
  answers = new Array(24).fill(null);
  showScreen('screen-start');
}
